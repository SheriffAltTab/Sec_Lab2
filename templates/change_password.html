{% extends "base.html" %}
{% block content %}
<h1>Зміна пароля</h1>
{% if first_login %}
  <p>Перший вхід: потрібно встановити новий пароль.</p>
{% endif %}
<p>Варіант №28: пароль має чергуватися за шаблоном: літера -> пунктуація -> цифра.</p>

<form method="post" class="card">
  {% if not first_login %}
    <label>Старий пароль
      <input name="old_password" type="password" required>
    </label>
  {% endif %}
  <label>Новий пароль
    <input name="new_password" type="password" required>
  </label>
  <label>Підтвердження нового пароля
    <input name="confirm_password" type="password" required>
  </label>
  <div class="row">
    <button type="submit">Зберегти</button>
    <button type="submit" name="cancel" value="1" class="secondary">
      {% if first_login %}Завершити роботу{% else %}Скасувати{% endif %}
    </button>
  </div>
</form>
{% endblock %}
